name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/lostb1t/remux-server

jobs:
  check-changes:
    name: Check for changes since last nightly
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare HEAD with last nightly
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CURRENT_SHA=$(git rev-parse --short HEAD)
          LAST_TITLE=$(gh release view nightly --repo "lostb1t/remux" --json name --jq '.name' 2>/dev/null || echo "")

          if echo "$LAST_TITLE" | grep -qF "$CURRENT_SHA"; then
            echo "No changes since last nightly (${CURRENT_SHA}), skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected (${CURRENT_SHA}), building."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  version:
    name: Compute version
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute nightly version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.0.1-nightly.$(date -u '+%Y%m%d').${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      cargo_version: ${{ needs.version.outputs.version }}
      docker_tags: -t ghcr.io/lostb1t/remux-server:nightly
      public_docker_tags: -t ghcr.io/lostb1t/remux:nightly
    secrets: inherit

  publish-nightly:
    name: Publish nightly release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: artifacts/amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: artifacts/arm64/

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cp artifacts/amd64/remux-server "remux-server-${VERSION}-linux-amd64"
          cp artifacts/arm64/remux-server "remux-server-${VERSION}-linux-arm64"
          chmod +x "remux-server-${VERSION}-linux-amd64" "remux-server-${VERSION}-linux-arm64"

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if gh release view nightly --repo "lostb1t/remux" >/dev/null 2>&1; then
            gh release delete nightly \
              --repo "lostb1t/remux" \
              --cleanup-tag \
              --yes
          else
            echo "No existing nightly release to delete"
          fi

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create nightly \
            --repo "lostb1t/remux" \
            --title "Nightly ${VERSION}" \
            --notes "Automated nightly build." \
            --prerelease \
            "remux-server-${VERSION}-linux-amd64" \
            "remux-server-${VERSION}-linux-arm64"

      - name: Checkout source README
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: lostb1t/remux
          token: ${{ secrets.GH_TOKEN }}
          path: public-repo

      - name: Push README to public repo
        run: |
          cp source/README.md public-repo/README.md
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md; then
            echo "README.md is already up to date"
            exit 0
          fi

          git add README.md
          git commit -m "docs: sync README from nightly"
          git push
