name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/remuxd/remux

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute nightly version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.0.0-nightly.$(date -u '+%Y%m%d').${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      cargo_version: ${{ needs.version.outputs.version }}
      docker_tags: -t ghcr.io/remuxd/remux:nightly
    secrets: inherit

  publish-nightly:
    name: Publish nightly release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: artifacts/amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: artifacts/arm64/

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cp artifacts/amd64/remux-server "remux-server-${VERSION}-linux-amd64"
          cp artifacts/arm64/remux-server "remux-server-${VERSION}-linux-arm64"
          chmod +x "remux-server-${VERSION}-linux-amd64" "remux-server-${VERSION}-linux-arm64"

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          gh release delete nightly \
            --repo "lostb1t/remux" \
            --cleanup-tag \
            --yes \
          || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create nightly \
            --repo "lostb1t/remux" \
            --title "Nightly ${VERSION}" \
            --notes "Automated nightly build." \
            --prerelease \
            "remux-server-${VERSION}-linux-amd64" \
            "remux-server-${VERSION}-linux-arm64"
