[config]
default_to_workspace = false

[env]
RUST_LOG = "warn,remux=info,remux_server=debug,axum=info,tower_http=info,hyper=warn,sqlx=warn"
RUST_BACKTRACE = 0
CONFIG = "./config"
AXUM_ANYHOW_EXPOSE_ERRORS=1
# HTTP_PROXY="http://10.0.10.11:9090"
# HTTPS_PROXY="http://10.0.10.11:9090"
WEB_PATH = "./jellyfin-web/dist"
DASHBOARD_PATH="./target/dx/remux-dashboard/debug/web/public"
DB_URL = "sqlite://db.sqlite?mode=rwc"
DATABASE_URL = "sqlite://db.sqlite?mode=rwc"
DB="db.sqlite"
SLOW_QUERY_THRESHOLD_MS=1000

[tasks.db-prepare]
command = "cargo"
args = ["sqlx", "prepare"]


[tasks.test]
cwd = "crates/remux-server"
command = "cargo"
args = ["test", "--", "--nocapture"]

[tasks.jellyfin-web-ensure]
description = "Ensure jellyfin-web is built"
condition = { files_not_exist = ["./jellyfin-web/dist"] }
run_task = "jellyfin-web"


[tasks.dev]
dependencies = ["jellyfin-web-ensure"]
run_task = { name = ["dev-server", "dev-build-dash"], fork = true, parallel = true }

[tasks.dev-server]
command = "cargo"
args = ["run" , "-p", "remux-server"]
watch = true
#cwd = "crates/server"

[tasks.dev-serve-dash]
command = "dx"
args = ["serve", "--addr", "0.0.0.0", "--port", "8888"]
cwd = "crates/remux-dashboard"

[tasks.dev-build-dash]
command = "dx"
args = ["build"]
cwd = "crates/remux-dashboard"
watch = {watch = ["${PWD}/crates/remux-dashboard/src", "${PWD}/crates/remux-dashboard/assets"]}

[tasks.build-desktop]
description = "Build the remux-desktop binary (system tray app for Windows/macOS/Linux)"
dependencies = ["build-desktop-dash", "jellyfin-web-ensure"]
command = "cargo"
args = ["build", "--release", "-p", "remux-desktop"]

[tasks.bundle-desktop]
description = "Build and bundle remux-desktop into a native app package (.app / .deb / .exe)"
dependencies = ["build-desktop-dash", "jellyfin-web-ensure"]
command = "cargo"
args = ["bundle", "--release", "-p", "remux-desktop"]

[tasks.build-desktop-dash]
description = "Build the dashboard WASM assets required by remux-desktop"
command = "dx"
args = ["build", "--release"]
cwd = "crates/remux-dashboard"

[tasks.build-docker]
dependencies = ["jellyfin-web-ensure"]
command = "docker"
args = ["buildx", "build", "--network", "host", "-f", "docker/Dockerfile", "-t", "ghcr.io/lostb1t/remux-server:local", "."]


[tasks.jellyfin-web-checkout]
description = "Clone jellyfin-web if not already present"
script = '''
JELLYFIN_WEB_TAG="v10.11.9"
if [ ! -d "jellyfin-web" ]; then
  git clone --depth 1 --branch "$JELLYFIN_WEB_TAG" https://github.com/jellyfin/jellyfin-web.git jellyfin-web
else
  cd jellyfin-web
  CURRENT=$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD)
  if [ "$CURRENT" != "$JELLYFIN_WEB_TAG" ]; then
    echo "Wrong version ($CURRENT), switching to $JELLYFIN_WEB_TAG"
    git fetch --depth 1 origin tag "$JELLYFIN_WEB_TAG"
    git checkout "$JELLYFIN_WEB_TAG"
  else
    echo "jellyfin-web $JELLYFIN_WEB_TAG already checked out"
  fi
fi
'''

[tasks.jellyfin-web-build]
description = "Install deps and build jellyfin-web"
cwd = "jellyfin-web"
script = '''
echo "engine-strict=false" > .npmrc
npm install
npm run build:production
'''

[tasks.jellyfin-web]
description = "Checkout and build jellyfin-web"
dependencies = ["jellyfin-web-checkout", "jellyfin-web-build"]

[tasks.web-clients]
description = "Checkout/build all supported web clients"
dependencies = ["jellyfin-web"]

[tasks.dev-container]
command = "docker"
args = ["run", "--rm", "-it", "-p", "8080:8080", "-v", "${PWD}:/app", "-v", "target:/app/target", "remux-dev"]
dependencies = ["build-dev"]
