[env]
RUST_LOG = "info,axum=warn,tower_http=trace,remux_server=debug,hyper=warn,sqlx=warn"
RUST_BACKTRACE = 0
CONFIG= "./config.toml"
AXUM_ANYHOW_EXPOSE_ERRORS=1
# HTTP_PROXY="http://10.0.10.11:9090"
# HTTPS_PROXY="http://10.0.10.11:9090"
DATABASE_URL = "sqlite://db.sqlite"

[tasks.sqlx-create]
command = "cargo"
args = ["sqlx", "database", "create"]

[tasks.sqlx-prepare]
command = "cargo"
args = ["sqlx", "prepare"]

[tasks.sqlx-migrate]
command = "cargo"
args = ["sqlx", "migrate", "run", "--source", "./migrations"]

[tasks.db]
command = "cargo"
args = ["run"]
dependencies = ["sqlx-create", "sqlx-migrate", "sqlx-prepare"]

[tasks.dev]
command = "cargo"
args = ["run"]
#dependencies = ["sqlx-create", "sqlx-migrate", "sqlx-prepare"]
watch = true

[tasks.build]
command = "docker"
# args = ["buildx", "build", "--platform", "linux/arm64", "-t", "ghcr.io/lostb1t/remux-server:latest", ".", "--push"]
args = ["buildx", "build", "--platform", "linux/arm64", "-t", "ghcr.io/lostb1t/remux-server:latest", "."]

[tasks.build-dev]
command = "docker"
args = ["build", "-f", "Dockerfile.dev", "-t", "remux-dev", "."]

[tasks.dev-container]
command = "docker"
args = ["run", "--rm", "-it", "-p", "8080:8080", "-v", "${PWD}:/app", "-v", "target:/app/target", "remux-dev"]
dependencies = ["build-dev"]
