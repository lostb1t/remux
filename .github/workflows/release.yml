name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/lostb1t/remux-server

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            semantic-release-cargo
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: "not-publishing-to-crates-io"

  build:
    name: Build
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.semantic-release.outputs.new_release_version }}
      cargo_version: ${{ needs.semantic-release.outputs.new_release_version }}
      docker_tags: >-
        -t ghcr.io/lostb1t/remux-server:${{ needs.semantic-release.outputs.new_release_version }}
        -t ghcr.io/lostb1t/remux-server:latest
      public_docker_tags: >-
        -t ghcr.io/lostb1t/remux:${{ needs.semantic-release.outputs.new_release_version }}
        -t ghcr.io/lostb1t/remux:latest
      ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
    secrets: inherit

  publish-release:
    name: Publish release
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: artifacts/amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: artifacts/arm64/

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          cp artifacts/amd64/remux-server "remux-server-${VERSION}-linux-amd64"
          cp artifacts/arm64/remux-server "remux-server-${VERSION}-linux-arm64"
          chmod +x "remux-server-${VERSION}-linux-amd64" "remux-server-${VERSION}-linux-arm64"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
          path: source

      - name: Extract changelog for this release
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          # Extract the section between the first and second version headings
          awk "/^# \[?${VERSION}\]?/{found=1; next} found && /^# /{exit} found{print}" \
            source/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          TAG="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          gh release create "${TAG}" \
            --repo "lostb1t/remux" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            "remux-server-${VERSION}-linux-amd64" \
            "remux-server-${VERSION}-linux-arm64"

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: lostb1t/remux
          token: ${{ secrets.GH_TOKEN }}
          path: public-repo

      - name: Push README to public repo
        run: |
          cp source/README.md public-repo/README.md
          cd public-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md; then
            echo "README.md is already up to date"
            exit 0
          fi

          git add README.md
          git commit -m "docs: sync README from ${{ needs.semantic-release.outputs.new_release_git_tag }}"
          git push
