name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PUBLIC_REPO: lostb1t/remux
  REGISTRY_IMAGE: ghcr.io/remuxd/remux

jobs:
  build-jellyfin-web:
    name: Build jellyfin-web
    runs-on: ubuntu-latest
    steps:
      - name: Cache jellyfin-web dist
        id: cache
        uses: actions/cache@v4
        with:
          path: dist/
          key: jellyfin-web-v10.11.6

      - name: Checkout jellyfin-web
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-web
          ref: v10.11.6

      - name: Setup Node
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm run build:production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-web-dist
          path: dist/
          retention-days: 90

  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: dashboard

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli
        run: cargo binstall dioxus-cli --no-confirm --force

      - name: Build dashboard
        working-directory: crates/remux-dashboard
        run: ~/.cargo/bin/dx build --release

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: target/dx/remux-dashboard/release/web/public/
          retention-days: 1

  build-desktop:
    name: Build (${{ matrix.target }})
    if: false
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: remux-desktop-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: remux-desktop-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: remux-desktop-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: remux-desktop-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ runner.os }}-${{ matrix.target }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-bundle
        run: cargo binstall cargo-bundle --no-confirm --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: target/dx/remux-dashboard/release/web/public/

      - name: Bundle remux-desktop (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          SQLX_OFFLINE: "true"
        run: cargo bundle --release --target ${{ matrix.target }} -p remux-desktop

      - name: Build remux-desktop (Windows)
        if: runner.os == 'Windows'
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }} -p remux-desktop

      - name: Package bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target/${{ matrix.target }}/release/bundle/osx
          zip -r ${{ github.workspace }}/${{ matrix.artifact }}.zip Remux.app

      - name: Package bundle (Linux .deb)
        if: runner.os == 'Linux'
        run: cp target/${{ matrix.target }}/release/bundle/deb/*.deb ${{ matrix.artifact }}.deb

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/remux-desktop.exe" .
          Compress-Archive -Path "remux-desktop.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.deb

  build-server:
    name: Build server (${{ matrix.arch }})
    needs: []
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.arch }}

      - name: Build remux-server
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }} -p remux-server

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/remux-server
          retention-days: 1

  build-docker:
    name: Build & push Docker
    needs: [build-dashboard, build-server, build-jellyfin-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: server-amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: server-arm64/

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/

      - name: Download jellyfin-web artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-web-dist
          path: jellyfin-web/

      - name: Mark server binaries executable
        run: chmod +x server-amd64/remux-server server-arm64/remux-server

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=nightly,enable=${{ github.ref_type != 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish to public repo
    needs: [build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "remux-desktop-*"
          merge-multiple: true

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}"   >> "$GITHUB_OUTPUT"
            echo "title=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"             >> "$GITHUB_OUTPUT"
            echo "nightly=false"                >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly"                  >> "$GITHUB_OUTPUT"
            echo "title=Nightly Build"          >> "$GITHUB_OUTPUT"
            echo "prerelease=true"              >> "$GITHUB_OUTPUT"
            echo "nightly=true"                 >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing nightly release
        if: steps.meta.outputs.nightly == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          gh release delete nightly \
            --repo "$PUBLIC_REPO" \
            --cleanup-tag \
            --yes \
          || true

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "$PUBLIC_REPO" \
            --title "${{ steps.meta.outputs.title }}" \
            --generate-notes \
            ${{ steps.meta.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            artifacts/*
