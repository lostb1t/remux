name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/remuxd/remux

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            semantic-release-cargo
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.semantic-release.outputs.new_release_version }}
      docker_tags: >-
        -t ghcr.io/remuxd/remux:${{ needs.semantic-release.outputs.new_release_version }}
        -t ghcr.io/remuxd/remux:latest
      ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
    secrets: inherit

  attach-artifacts:
    name: Attach artifacts to release
    needs: [semantic-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: artifacts/amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: artifacts/arm64/

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          cp artifacts/amd64/remux-server "remux-server-${VERSION}-linux-amd64"
          cp artifacts/arm64/remux-server "remux-server-${VERSION}-linux-arm64"
          chmod +x "remux-server-${VERSION}-linux-amd64" "remux-server-${VERSION}-linux-arm64"

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          TAG="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          gh release upload "${TAG}" \
            "remux-server-${VERSION}-linux-amd64" \
            "remux-server-${VERSION}-linux-arm64" \
            --repo "${{ github.repository }}"
