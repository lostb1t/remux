services:
  remux-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        JF_FFMPEG_VERSION: 7.1.1-7

    volumes:
      - .:/appp
      - remux-cargo:/cargo
      - remux-rustup:/rustup
      - remux-target:/app/target

    environment:
      RUST_BACKTRACE: 1

    ports:
      - "3001:3000"
    command: ["bash", "-lc", "ls -la /appp"]

volumes:
  remux-cargo:
  remux-rustup:
  remux-target: