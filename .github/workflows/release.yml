name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PUBLIC_REPO: lostb1t/remux
  REGISTRY_IMAGE: ghcr.io/remuxd/remux

jobs:
  build-jellyfin-web:
    name: Build jellyfin-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jellyfin-web
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-web
          ref: v10.11.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-web-dist
          path: dist/
          retention-days: 1

  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: dashboard

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli
        run: cargo binstall dioxus-cli --no-confirm --force

      - name: Build dashboard
        working-directory: crates/remux-dashboard
        run: ~/.cargo/bin/dx build --release

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: target/dx/remux-dashboard/release/web/public/
          retention-days: 1

  build:
    name: Build (${{ matrix.target }})
    if: false
    needs: build-dashboard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: remux-desktop-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: remux-desktop-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: remux-desktop-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: remux-desktop-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ runner.os }}-${{ matrix.target }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-bundle
        run: cargo binstall cargo-bundle --no-confirm --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: target/dx/remux-dashboard/release/web/public/

      - name: Bundle remux-desktop (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          SQLX_OFFLINE: "true"
        run: cargo bundle --release --target ${{ matrix.target }} -p remux-desktop

      - name: Build remux-desktop (Windows)
        if: runner.os == 'Windows'
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }} -p remux-desktop

      - name: Package bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          cd target/${{ matrix.target }}/release/bundle/osx
          zip -r ${{ github.workspace }}/${{ matrix.artifact }}.zip Remux.app

      - name: Package bundle (Linux .deb)
        if: runner.os == 'Linux'
        run: cp target/${{ matrix.target }}/release/bundle/deb/*.deb ${{ matrix.artifact }}.deb

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/remux-desktop.exe" .
          Compress-Archive -Path "remux-desktop.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact (macOS / Windows)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.deb

  build-server:
    name: Build server (${{ matrix.arch }})
    needs: []
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.arch }}

      - name: Build remux-server
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --target ${{ matrix.target }} -p remux-server

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/remux-server
          retention-days: 1

  build-docker:
    name: Build Docker (${{ matrix.platform }})
    needs: [build-dashboard, build-server, build-jellyfin-web]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
            ffmpeg_asset: jellyfin-ffmpeg_7.1.3-3_portable_linux64-gpl.tar.xz
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            ffmpeg_asset: jellyfin-ffmpeg_7.1.3-3_portable_linuxarm64-gpl.tar.xz
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/

      - name: Download jellyfin-web artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-web-dist
          path: jellyfin-web/

      - name: Download jellyfin-ffmpeg
        run: |
          curl -fsSL "https://github.com/jellyfin/jellyfin-ffmpeg/releases/download/v7.1.3-3/${{ matrix.ffmpeg_asset }}" \
            -o ffmpeg-archive.tar.xz
          mkdir jellyfin-ffmpeg
          tar -xJf ffmpeg-archive.tar.xz -C jellyfin-ffmpeg --strip-components=1

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: ./

      - name: Mark binaries executable
        run: |
          chmod +x ./remux-server
          chmod +x ./jellyfin-ffmpeg/ffmpeg ./jellyfin-ffmpeg/ffprobe || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    name: Merge Docker manifests
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set image tags
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=-t ${{ env.REGISTRY_IMAGE }}:${{ github.ref_name }} -t ${{ env.REGISTRY_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=-t ${{ env.REGISTRY_IMAGE }}:nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.tags }} \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

  release:
    name: Publish to public repo
    needs: [merge-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "remux-desktop-*"
          merge-multiple: true

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}"   >> "$GITHUB_OUTPUT"
            echo "title=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"             >> "$GITHUB_OUTPUT"
            echo "nightly=false"                >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly"                  >> "$GITHUB_OUTPUT"
            echo "title=Nightly Build"          >> "$GITHUB_OUTPUT"
            echo "prerelease=true"              >> "$GITHUB_OUTPUT"
            echo "nightly=true"                 >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing nightly release
        if: steps.meta.outputs.nightly == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          gh release delete nightly \
            --repo "$PUBLIC_REPO" \
            --cleanup-tag \
            --yes \
          || true

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "$PUBLIC_REPO" \
            --title "${{ steps.meta.outputs.title }}" \
            --generate-notes \
            ${{ steps.meta.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            artifacts/*
