[config]
default_to_workspace = false

[env]
RUST_LOG = "info,axum=info,tower_http=info,remux_server=debug,hyper=warn,sqlx=error"
RUST_BACKTRACE = 0
CONFIG = "./config"
AXUM_ANYHOW_EXPOSE_ERRORS=1
# HTTP_PROXY="http://10.0.10.11:9090"
# HTTPS_PROXY="http://10.0.10.11:9090"
WEB_PATH = "../jellyfin-web/dist"
DASHBOARD_PATH="./target/dx/dashboard/debug/web/public"
DB_URL = "sqlite://db.sqlite?mode=rwc"
DATABASE_URL = "sqlite://db.sqlite?mode=rwc"
DB="db.sqlite"

[env.test]
DB_URL = "sqlite://test.sqlite"
DB="test.sqlite"

[tasks.db-create]
command = "cargo"
args = ["sqlx", "database", "create"]

[tasks.db-prepare]
command = "cargo"
args = ["sqlx", "prepare"]

[tasks.db-migrate]
command = "cargo"
args = ["sqlx", "migrate", "run", "--source", "./crates/server/migrations"]

[tasks.db-remove]
command = "rm"
args = ["-f", "${DB}"]

[tasks.db-reset]
dependencies = ["db-remove", "db-create", "db-migrate"]

[tasks.test]
#env = { "DATABASE_URL" = "sqlite://test.sqlite" }
dependencies = ["db-reset"]
command = "cargo"
args = ["test"]

[tasks.dev]
#command = "cargo"
#args = ["run"]
#dependencies = ["dev-server", "dev-dash"]
run_task = { name = ["dev-server", "dev-build-dash"], fork = true, parallel = true }

[tasks.dev-server]
command = "cargo"
args = ["run" , "-p", "remux-server"]
watch = true
#cwd = "crates/server"

[tasks.dev-serve-dash]
command = "dx"
args = ["serve", "--addr", "0.0.0.0", "--port", "8888"]
cwd = "crates/dashboard"

[tasks.dev-build-dash]
command = "dx"
args = ["build"]
cwd = "crates/dashboard"
watch = {watch = ["${PWD}/crates/dashboard/src"]}

[tasks.build-docker]
command = "docker"
args = ["buildx", "build", "--network", "host", "-f", "docker/Dockerfile", "-t", "ghcr.io/lostb1t/remux-server:local", "."]

[tasks.build]
command = "docker"
args = ["build", "-f", "Dockerfile.dev", "-t", "remux-dev", "."]

[tasks.dev-container]
command = "docker"
args = ["run", "--rm", "-it", "-p", "8080:8080", "-v", "${PWD}:/app", "-v", "target:/app/target", "remux-dev"]
dependencies = ["build-dev"]
