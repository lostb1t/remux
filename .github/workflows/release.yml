name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/lostb1t/remux

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  semantic-release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            semantic-release-cargo
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: "not-publishing-to-crates-io"

  build:
    name: Build
    needs: [semantic-release, test]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.semantic-release.outputs.new_release_version }}
      cargo_version: ${{ needs.semantic-release.outputs.new_release_version }}
      docker_tags: >-
        -t ghcr.io/lostb1t/remux:${{ needs.semantic-release.outputs.new_release_version }}
        -t ghcr.io/lostb1t/remux:latest
      ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
    secrets: inherit

  publish-release:
    name: Publish release
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download server binary (amd64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-amd64
          path: artifacts/amd64/

      - name: Download server binary (arm64)
        uses: actions/download-artifact@v4
        with:
          name: server-linux-arm64
          path: artifacts/arm64/

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}
          path: source

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          cp artifacts/amd64/remux-server "remux-${VERSION}-linux-amd64"
          cp artifacts/arm64/remux-server "remux-${VERSION}-linux-arm64"
          chmod +x "remux-${VERSION}-linux-amd64" "remux-${VERSION}-linux-arm64"

      - name: Extract changelog for this release
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          # Extract the section between the first and second version headings
          awk "/^#+ \[?${VERSION}\]?/{found=1; next} found && /^#+ /{exit} found{print}" \
            source/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}" > release-notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          TAG="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            "remux-${VERSION}-linux-amd64" \
            "remux-${VERSION}-linux-arm64"
